<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><title>STG | MARS GRAVITY ASSIST HUD</title>
    <style>
        :root { --neon: #ff4500; --gold: #ffd700; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Share Tech Mono', monospace; margin: 0; text-align: center; }
        .hud-container { border: 2px solid var(--neon); margin: 20px; padding: 20px; background: rgba(255, 69, 0, 0.05); }
        .mars-orbit { width: 300px; height: 300px; border: 1px dashed #555; border-radius: 50%; margin: 20px auto; position: relative; }
        .planet-mars { width: 60px; height: 60px; background: radial-gradient(circle, #ff4500, #8b0000); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 30px var(--neon); }
        .spacecraft { width: 10px; height: 10px; background: var(--gold); border-radius: 50%; position: absolute; animation: slingshot 5s infinite linear; }
        @keyframes slingshot {
            0% { top: 0%; left: 0%; }
            40% { top: 45%; left: 45%; } /* Dekat Mars */
            60% { top: 55%; left: 55%; } /* Gravity Assist */
            100% { top: 100%; left: 100%; transform: scale(2); } /* Melesat */
        }
        .data-stream { font-size: 0.8rem; color: var(--neon); text-align: left; padding: 10px; border-top: 1px solid var(--neon); }
    </style>
</head>
<body>
    <div class="hud-container">
        <h1 style="color:var(--neon)">🔴 MISSION STATUS: MARS GRAVITY ASSIST</h1>
        <p>EVENT: MAYDAY 2026 | TARGET: 16 PSYCHE</p>
        
        <div class="mars-orbit">
            <div class="planet-mars"></div>
            <div class="spacecraft"></div>
        </div>

        <div class="data-stream">
            [SYS] APPROACHING MARS... DISTANCE: 3,421 KM <br>
            [SYS] VELOCITY: 21,000 KPH (SLINGSHOT ACTIVE) <br>
            [SYS] DSOC LASER: CONNECTED TO SWISS HUB <br>
            [SYS] STATUS: FOLDING SPACE-TIME...
        </div>
        
        <button onclick="location.href='https://github.io'" style="background:var(--neon); color:white; border:none; padding:10px; margin-top:10px; cursor:pointer;">KEMBALI KE SIRKUS</button>
    </div>
</body>
</html>
