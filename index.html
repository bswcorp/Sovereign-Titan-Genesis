<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TITAN PORTAL | ARCHITECT ANDI M. HARPIANTO</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --neon: #00f2ff; --red: #ff3e3e; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; text-align: center; padding: 20px; overflow-x: hidden; }
        
        /* FRAME EMAS BERDENYUT */
        .vault-frame { 
            border: 4px solid var(--gold); padding: 30px; display: inline-block; 
            background: rgba(0,0,0,0.9); border-radius: 20px; box-shadow: 0 0 40px var(--gold); 
            animation: heartBeat 1.5s infinite; width: 100%; max-width: 450px;
        }
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px var(--gold); }
            50% { transform: scale(1.02); box-shadow: 0 0 50px var(--red); border-color: var(--red); }
        }

        .balance-display { font-size: 2.2rem; color: #fff; margin: 15px 0; text-shadow: 0 0 10px var(--neon); }
        .btn { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 10px; margin-top: 10px; text-transform: uppercase; }
        .btn-transfer { background: var(--gold); margin-top: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #111; color: var(--neon); border: 1px solid var(--gold); border-radius: 5px; box-sizing: border-box; }
        .log-box { margin-top: 20px; font-size: 0.7rem; color: #888; text-align: left; background: #000; padding: 10px; border: 1px solid #333; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="goldParticles"></div>

    <div class="vault-frame">
        <h1 style="color: var(--gold); margin: 0; font-size: 1.5rem;">QUORUM-STATE GENESIS</h1>
        <p style="font-size: 0.7rem; opacity: 0.7;">OTORITAS: ANDI MUHAMMAD HARPIANTO</p>
        
        <div style="border-top: 1px solid #333; margin-top: 15px; padding-top: 15px;">
            <div id="statusLog" style="color: var(--neon); font-size: 0.8rem;">● STANDBY MODE</div>
            <div class="balance-display" id="aksaBalance">0 AKSA</div>
            <div style="color: var(--gold); font-size: 0.8rem;" id="qstateBalance">0 $QSTATE</div>
        </div>
<!-- PANEL EKSPANSI GLOBAL -->
<div style="margin-top: 30px; border-top: 2px double var(--gold); padding-top: 20px;">
    <p style="color: var(--gold); font-size: 0.8rem; letter-spacing: 1px;">EXTERNAL ACCESS PORTAL</p>
    
    <div style="display: flex; gap: 10px; flex-direction: column;">
        <!-- TOMBOL KE BANK SENTRAL -->
        <a href="#" onclick="alert('Membuka Vault Bank Sentral...')" style="text-decoration: none;">
            <button class="btn" style="background: #111; color: var(--gold); border: 1px solid var(--gold);">
                🏛️ ENTER CENTRAL BANK VAULT
            </button>
        </a>

        <!-- TOMBOL KE SITUS INTERNASIONAL (HALAMAN BERBEDA) -->
        <a href="https://quorumstate.international/" target="_blank" style="text-decoration: none;">
            <button class="btn diamond-shine" style="background: linear-gradient(45deg, #004e92, #000428); color: white; border: 1px solid var(--neon);">
                🌐 GLOBAL INTERNATIONAL SITE
            </button>
        </a>
    </div>
</div>
        
        <button class="btn" id="connectBtn">IDENTIFIKASI WALLET (Cek 1T)</button>

        <!-- PANEL TRANSAKSI OTOMATIS -->
        <div id="txPanel" style="display:none; margin-top: 20px; border-top: 1px dashed #444; padding-top: 15px;">
            <b style="color: var(--gold); font-size: 0.8rem;">PANEL TRANSFER CEPAT</b>
            <input type="text" id="targetAddr" placeholder="Alamat Tujuan (0x...)">
            <input type="number" id="sendAmt" placeholder="Jumlah AKSA">
            <button class="btn btn-transfer" id="sendBtn">KIRIM SEKARANG</button>
        </div>

        <div class="log-box" id="eventLog">DETEKTOR: Menunggu Koneksi...</div>
    </div>

    <script type="module">
        import { ethers } from "https://cdnjs.cloudflare.com";

        // --- MASUKKAN ALAMAT KONTRAK TERBARU DARI BRANKAS ---
        const contractAddress = "PASTE_ALAMAT_KONTRAK_BAPAK_DI_SINI"; 
        
        const abi = [
            "function balanceOf(address) view returns (uint256)",
            "function transfer(address to, uint256 amount) returns (bool)",
            "event Transfer(address indexed from, address indexed to, uint256 value)"
        ];

        let signer, contract, userAddr;

        const log = (msg) => {
            const el = document.getElementById('eventLog');
            el.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        };

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userAddr = accounts[0];
                signer = await provider.getSigner();
                contract = new ethers.Contract(contractAddress, abi, signer);
                
                log("Identitas Diterima: " + userAddr);
                document.getElementById('txPanel').style.display = "block";
                document.getElementById('connectBtn').innerText = "WALLET CONNECTED";
                
                // --- DETEKTOR TRANSAKSI LIVE ---
                contract.on("Transfer", (from, to, value) => {
                    log(`Deteksi Transfer: ${ethers.formatUnits(value, 18)} QSTATE`);
                    refreshData();
                });

                refreshData();
                setInterval(refreshData, 5000); // Auto-Refresh tiap 5 detik
            }
        };

        async function refreshData() {
            const bal = await contract.balanceOf(userAddr);
            const qstate = ethers.formatUnits(bal, 18);
            const aksa = parseFloat(qstate) * 100000000;
            document.getElementById('aksaBalance').innerText = aksa.toLocaleString('id-ID') + " AKSA";
            document.getElementById('qstateBalance').innerText = parseFloat(qstate).toLocaleString('id-ID') + " $QSTATE";
        }

        document.getElementById('sendBtn').onclick = async () => {
            const to = document.getElementById('targetAddr').value;
            const amt = document.getElementById('sendAmt').value;
            try {
                const qAmt = (parseFloat(amt) / 100000000).toString();
                const tx = await contract.transfer(to, ethers.parseUnits(qAmt, 18));
                log("Memproses Transaksi...");
                await tx.wait();
                log("Berhasil Terkirim!");
                alert("Transfer Sukses!");
            } catch (err) {
                log("Error: " + err.message);
                alert("Gagal: Saldo tidak cukup atau Gas Error.");
            }
        };
    </script>
</body>
</html>
