<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STG Explorer</title>
<style>
body{
	background:#050505;
	color:#00ffcc;
	font-family:monospace;
	padding:20px;
}
.card{
	background:#111;
	border:1px solid #333;
	padding:20px;
	margin-bottom:20px;
	border-radius:10px;
}
h1{
	color:#00ffaa;
}
.value{
	color:#ffd700;
	font-size:20px;
}
.tx{
	border-bottom:1px solid #222;
	padding:10px 0;
}
</style>
</head>
<body>

<h1>🛰️ STG CHAIN EXPLORER</h1>

<div class="card">
	<div>Current Block:</div>
	<div id="blockNumber" class="value">Loading...</div>
</div>

<div class="card">
	<div>Genesis Balance:</div>
	<div id="genesisBalance" class="value">Loading...</div>
</div>

<div class="card">
	<h3>Latest Transactions</h3>
	<div id="txList"></div>
</div>

<script>
const RPC_URL = "http://localhost:8545";

async function rpc(method, params=[]) {
	const res = await fetch(RPC_URL,{
		method:"POST",
		headers:{
			"Content-Type":"application/json"
		},
		body:JSON.stringify({
			jsonrpc:"2.0",
			method,
			params,
			id:1
		})
	});
	return await res.json();
}

async function refreshExplorer(){
	try {
		// block number
		const block = await rpc("eth_blockNumber");
		document.getElementById("blockNumber").innerText = block.result;

		// genesis balance
		const bal = await rpc("eth_getBalance", ["0xgenesis"]);
		document.getElementById("genesisBalance").innerText = bal.result;

		// transactions
		const txs = await rpc("stg_transactions");
		const txList = document.getElementById("txList");
		txList.innerHTML = "";

		if(txs.result && txs.result.length > 0) {
			txs.result.reverse().forEach(tx=>{
				const div = document.createElement("div");
				div.className = "tx";
				div.innerHTML = `
					<div>HASH: ${tx.hash}</div>
					<div>FROM: ${tx.from}</div>
					<div>TO: ${tx.to}</div>
					<div>VALUE: ${tx.value}</div>
				`;
				txList.appendChild(div);
			});
		}
	} catch (err) {
		console.error("Explorer sync tracking error:", err);
	}
}

refreshExplorer();
setInterval(refreshExplorer,2000);
</script>
</body>
</html>
