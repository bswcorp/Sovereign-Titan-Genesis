<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STG Control Terminal - Unlocked</title>
    <script src="https://cloudflare.com"></script>
    <style>
        :root { --bg-primary: #020617; --bg-card: rgba(15, 23, 42, 0.8); --accent-gold: #fbbf24; --text-main: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-primary); color: var(--text-main); font-family: system-ui, sans-serif; padding: 20px; }
        .hidden { display: none !important; }
        .card { background: var(--bg-card); border: 1px solid #1e293b; border-radius: 12px; padding: 25px; max-width: 450px; margin: 60px auto; backdrop-filter: blur(10px); }
        .dashboard { max-width: 1000px; margin: 0 auto; background: #0f172a; padding: 25px; border-radius: 12px; border: 1px solid var(--accent-gold); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: #000; border: 1px solid #1e293b; cursor: pointer; font-weight: bold; border-radius: 6px; }
        .tab.active { border-color: var(--accent-gold); color: var(--accent-gold); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; background: rgba(0,0,0,0.6); border: 1px solid #334155; color: #fff; border-radius: 6px; font-family: monospace; font-size: 1rem; }
        input:focus { border-color: var(--accent-gold); outline: none; }
        .btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold); font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .btn:hover { background: var(--accent-gold); color: #000; }
        .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .metric-box { background: rgba(0,0,0,0.5); border: 1px solid #1e293b; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

    <!-- GATEWAY AUTHENTICATION -->
    <div id="authPortal" class="card">
        <div class="tabs">
            <div id="tabLogin" class="tab active" onclick="switchTab('LOGIN')">MASUK</div>
            <div id="tabRegister" class="tab" onclick="switchTab('REGISTER')">DAFTAR PILOT ACC</div>
        </div>
        <form id="authForm" onsubmit="executeAuth(event)">
            <div class="form-group hidden" id="userGroup"><label>Nama Operator/Pilot</label><input type="text" id="inpUser" placeholder="Contoh: CapoSTG"></div>
            <div class="form-group"><label>Email Akun</label><input type="email" id="inpEmail" required placeholder="capo@stg.inc"></div>
            <div class="form-group"><label>Password</label><input type="password" id="inpPass" required placeholder="••••••••"></div>
            
            <!-- SEKTOR YANG DI-BONGKAR: INPUT WALLET MANUAL AKTIF -->
            <div class="form-group hidden" id="walletGroup">
                <label>Alamat Wallet MetaMask (Ketik Manual / Paste Bebas)</label>
                <input type="text" id="inpWallet" placeholder="Ketik 0x... atau Tempel Alamat Wallet Anda">
                <button type="button" class="btn" style="font-size:0.75rem; margin-top:8px;" onclick="fetchMetaMaskAddr()">COBA DETEKSI OTOMATIS</button>
            </div>
            
            <button type="submit" class="btn" style="margin-top: 15px;" id="btnSubmit">MASUK STG HUB</button>
        </form>
    </div>

    <!-- MAIN TERMINAL DASHBOARD -->
    <div id="mainHub" class="dashboard hidden">
        <h2 style="color:var(--accent-gold); margin-bottom: 5px;">🏛️ STG COMMAND CENTER WALLET</h2>
        <p style="color:#94a3b8; font-size:0.85rem; margin-bottom: 20px;">SINKRONISASI AKTIF JARINGAN METAMASK INTERNAL & EKSTERNAL</p>
        
        <div class="metrics">
            <div class="metric-box">
                <div style="font-size:0.75rem; color:#94a3b8;">SALDO CASHOUT INTERNAL (IDR)</div>
                <div id="txtIdr" style="font-size:1.4rem; font-weight:bold; color:#60a5fa; margin-top:5px;">Rp 0,00</div>
            </div>
            <div class="metric-box">
                <div style="font-size:0.75rem; color:#94a3b8;">SALDO ON-CHAIN WALLET (ETH/QBC)</div>
                <div id="txtCrypto" style="font-size:1.4rem; font-weight:bold; color:var(--accent-gold); margin-top:5px;">0.0000 ETH</div>
            </div>
        </div>
        <p style="font-size:0.8rem; color:#94a3b8; margin-bottom:20px;">Connected Wallet Address: <span id="txtAddr" style="font-family:monospace; color:#fff;">None</span></p>

        <!-- SWAP TERMINAL -->
        <div style="border-top:1px solid #1e293b; padding-top:20px;">
            <h4 style="color:var(--accent-gold); margin-bottom:15px;">💱 EKSEKUSI PENUKARAN SWAP KAS INSTAN</h4>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px;">
                <div class="form-group">
                    <label>Arah Aliran Dana</label>
                    <select id="swapDir"><option value="IDR_TO_QBC">Beli QBC Koin (Potong Saldo IDR)</option></select>
                </div>
                <div class="form-group">
                    <label>Jumlah Nominal Rupiah</label>
                    <input type="number" id="swapAmt" placeholder="Masukkan jumlah...">
                </div>
            </div>
            <button class="btn" onclick="triggerSwapOrder()">KIRIM PERINTAH SWAP</button>
        </div>
    </div>

    <script>
        const BASE_API = "http://localhost:5000/api";
        let mode = "LOGIN", token = localStorage.getItem("stg_token") || null;

        window.addEventListener('load', () => { if(token) loadDashboard(); });

        function switchTab(target) {
            mode = target;
            document.getElementById("tabLogin").classList.toggle("active", target === "LOGIN");
            document.getElementById("tabRegister").classList.toggle("active", target === "REGISTER");
            document.getElementById("userGroup").classList.toggle("hidden", target === "LOGIN");
            document.getElementById("walletGroup").classList.toggle("hidden", target === "LOGIN");
            document.getElementById("btnSubmit").innerText = target === "LOGIN" ? "MASUK STG HUB" : "DAFTAR SEKARANG";
        }

        async function fetchMetaMaskAddr() {
            if(!window.ethereum) return alert("MetaMask tidak terdeteksi otomatis.");
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById("inpWallet").value = accounts[0];
            } catch(e) { alert("Deteksi otomatis diblokir browser HP. Silakan ketik/paste manual saja, Capo!"); }
        }

        async function executeAuth(e) {
            e.preventDefault();
            const email = document.getElementById("inpEmail").value;
            const password = document.getElementById("inpPass").value;
            
            const url = mode === "LOGIN" ? "/auth/login" : "/auth/register";
            const body = mode === "LOGIN" ? { email, password } : {
                username: document.getElementById("inpUser").value, email, password,
                walletAddress: document.getElementById("inpWallet").value
            };

            try {
                const res = await fetch(`${BASE_API}${url}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error || "Akses ditolak.");

                if(mode === "LOGIN") {
                    localStorage.setItem("stg_token", data.token);
                    token = data.token;
                    loadDashboard();
                } else {
                    alert("Akun sukses terdaftar! Sekarang silakan beralih ke tab MASUK menggunakan Email Anda.");
                    switchTab("LOGIN");
                }
            } catch(err) {
                alert(`⚠️ PENOLAKAN SISTEM:\n${err.message}`);
            }
        }

        async function loadDashboard() {
            document.getElementById("authPortal").classList.add("hidden");
            document.getElementById("mainHub").classList.remove("hidden");
            
            try {
                const res = await fetch(`${BASE_API}/banking/dashboard`, { headers: { "Authorization": `Bearer ${token}` } });
                const data = await res.json();
                const balanceObj = data.balances.find(b => b.currency === 'IDR');
                if(balanceObj) {
                    document.getElementById("txtIdr").innerText = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR' }).format(balanceObj.fiat_balance);
                }
            } catch(e) { console.error(e); }

            if(window.ethereum) {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if(accounts.length > 0) {
                    document.getElementById("txtAddr").innerText = accounts[0];
                    const bal = await provider.getBalance(accounts[0]);
                    document.getElementById("txtCrypto").innerText = `${parseFloat(ethers.formatEther(bal)).toFixed(4)} ETH`;
                }
            }
        }

        async function triggerSwapOrder() {
            const amt = document.getElementById("swapAmt").value;
            if(!amt) return alert("Isi nominal!");
            try {
                const res = await fetch(`${BASE_API}/exchange/swap`, {
                    method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                    body: JSON.stringify({ direction: document.getElementById("swapDir").value, amount: amt })
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error);
                alert("🚀 Perintah Swap Berhasil Dieksekusi!");
                location.reload();
            } catch(e) { alert(e.message); }
        }
    </script>
</body>
</html>
