<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STG-UNIFIED | Mission Control Terminal</title>
    <style>
        body { background: #020202; color: #00ff00; font-family: 'Courier New', monospace; padding: 30px; text-align: center; }
        .glass-panel { border: 1px solid rgba(214, 175, 55, 0.4); background: rgba(10, 10, 10, 0.9); padding: 30px; box-shadow: 0 0 25px rgba(0, 255, 0, 0.15); max-width: 800px; margin: 0 auto; }
        .trisula-header { color: #d4af37; font-size: 2em; letter-spacing: 5px; text-shadow: 0 0 10px rgba(214,175,55,0.3); }
        .connect-btn { background: transparent; border: 1px solid #d4af37; color: #d4af37; padding: 12px 24px; cursor: pointer; letter-spacing: 2px; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        .connect-btn:hover { background: #d4af37; color: #000; box-shadow: 0 0 15px #d4af37; }
    </style>
</head>
<body>
    <div class="glass-panel">
        <h1 class="trisula-header">STG UNIFIED TERMINAL</h1>
        <p style="color: #888; font-size: 0.85em; letter-spacing: 1px;">SENJATA TRISULA CORE OPERATIONAL INTERFACE</p>
        <hr border="1" color="#d4af37" style="opacity: 0.2; margin-bottom: 25px;">

        <button id="walletConnectBtn" class="connect-btn">CONNECT TITAN GUARD SHIELD</button>
        
        <!-- Target anchoring layout container for MetaportationTerminal module -->
        <div id="terminalTargetContainer"></div>
        
        <pre id="logDisplay" style="margin-top: 25px; text-align: left; background: #000; padding: 15px; font-size: 0.8em; border-left: 3px solid #d4af37; color: #aaa;">[SYSTEM]: Awaiting secure hardware initialization...</pre>
    </div>

    <!-- Framework compilation script linkage entry gate -->
    <script type="module">
        import { connectSovereignWallet } from './src/services/wallet.js';
        import { initMetaportationTerminal } from './src/components/MetaportationTerminal.js';

        // Boot and map interface elements post-load
        initMetaportationTerminal('terminalTargetContainer');

        document.getElementById('walletConnectBtn').addEventListener('click', async () => {
            const display = document.getElementById('logDisplay');
            try {
                display.innerText = "[LOG]: Initializing cryptographic handshake payload...";
                const accounts = await connectSovereignWallet();
                display.innerText = `✅ HANDSHAKE VERIFIED\nSovereign Core Address: ${accounts[0]}\nStatus: Linked to TRISULA network grid.`;
                display.style.color = "#00ff00";
            } catch (err) {
                display.innerText = `🚨 ACCESS DENIED:\n${err.message}`;
                display.style.color = "#ff0000";
            }
        });
    </script>
</body>
</html>
