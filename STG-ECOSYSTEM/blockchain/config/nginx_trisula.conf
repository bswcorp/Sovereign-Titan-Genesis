# 🏛️ STG UNIFIED - WEB PROXY SERVICE LAYER CONFIGURATION
# Purpose: Exposes Secure Static Web UI and Proxies Local Blockchain APIs

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Anti-DDoS Rate Limiting Zone for Public Security
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=30r/s;

    # Upstream mapping to local STG-Chain RPC daemon port
    upstream stg_core_node {
        server 127.0.0.1:8545;
    }

    # HTTP to HTTPS Global Redirect Altar
    server {
        listen 80;
        server_name quorumstate.international;
        return 301 https://$host$request_uri;
    }

    # 🛡️ SECURE PRODUCTION SERVER INTERFACE
    server {
        listen 443 ssl;
        server_name quorumstate.international;

        # TLS/SSL Cryptographic Key Specifications
        ssl_certificate /etc/letsencrypt/live/quorumstate.international/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/quorumstate.international/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # 📦 LOCATION 1: Direct Mapping to Newly Compiled Static Build Outputs
        location / {
            limit_req zone=web_limit burst=15 nodelay;
            root /home/userland/Sovereign-Titan-Genesis/dist/frontend;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 📡 LOCATION 2: Protected Proxy Pass Routing to Blockchain RPC Core Engine
        location /rpc {
            proxy_pass http://stg_core_node;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
